name: Build Windows EXE

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content version.py) -replace '"0\.0\.0"', ('"' + $ver + '"') | Set-Content version.py

      - name: Build EXE
        run: pyinstaller BackupSystem.spec --clean

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/BackupSystem.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  BackupSystem.exe" | Out-File -Encoding utf8 dist/BackupSystem.exe.sha256
          Write-Output "SHA-256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: BackupSystem-windows
          path: |
            dist/BackupSystem.exe
            dist/BackupSystem.exe.sha256
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            dist/BackupSystem.exe
            dist/BackupSystem.exe.sha256
          generate_release_notes: true
